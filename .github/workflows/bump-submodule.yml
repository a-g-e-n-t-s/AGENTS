name: Bump submodule

on:
  workflow_call:
    inputs:
      submodule-path:
        required: true
        type: string
    secrets:
      PAT_TOKEN:
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: a-g-e-n-t-s/AGENTS
          token: ${{ secrets.PAT_TOKEN }}
          submodules: true

      - name: Update submodule pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --remote ${{ inputs.submodule-path }}
          git add ${{ inputs.submodule-path }}
          git diff --cached --quiet || git commit -m "chore: bump ${{ inputs.submodule-path }}"
          git push
