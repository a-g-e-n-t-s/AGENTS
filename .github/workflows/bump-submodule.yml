name: Bump submodule

on:
  workflow_call:
    inputs:
      submodule-path:
        required: true
        type: string
    secrets:
      PAT_TOKEN:
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: a-g-e-n-t-s/AGENTS
          token: ${{ secrets.PAT_TOKEN }}
          submodules: true

      - name: Update submodule pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git submodule update --remote ${{ inputs.submodule-path }}
          git add ${{ inputs.submodule-path }}
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: bump ${{ inputs.submodule-path }}"
          # Retry push up to 3 times to handle race conditions
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase
          done
          echo "Failed after 3 attempts"
          exit 1
