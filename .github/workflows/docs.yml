name: agents-docs

on:
  push:
    branches: [main]
    paths:
      - 'Docs/**'
      - '**/README.md'
      - '**/agent.json'
      - '**/CLAUDE.md'
      - 'agent-docs/**'
      - '**/src/**'
      - '**/config.toml'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Clone sibling repos (Engine + DaemonAgent)
      - name: Clone Engine repo
        uses: actions/checkout@v4
        with:
          repository: dadavidtseng/Engine
          path: Engine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone DaemonAgent repo
        uses: actions/checkout@v4
        with:
          repository: dadavidtseng/DaemonAgent
          path: DaemonAgent
          token: ${{ secrets.GITHUB_TOKEN }}

      # Create symlinks so ../../Engine resolves from agent-docs/
      - name: Link sibling repos
        run: |
          ln -sf $GITHUB_WORKSPACE/Engine $GITHUB_WORKSPACE/../Engine
          ln -sf $GITHUB_WORKSPACE/DaemonAgent $GITHUB_WORKSPACE/../DaemonAgent

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-docs/package-lock.json

      # ── Step 1: Install ──
      - name: Install dependencies
        run: npm ci
        working-directory: agent-docs

      # ── Step 1.5: Restore docs generation cache ──
      - name: Restore docs-gen cache
        uses: actions/cache@v4
        with:
          path: |
            agent-docs/.cache/docs-gen
            agent-docs/.cache/readme-gen
          key: docs-gen-${{ hashFiles('**/src/**/*.ts', '**/agent.json', '**/config.toml') }}
          restore-keys: |
            docs-gen-

      # ── Step 2: Sync docs from all repos ──
      - name: Sync documentation
        env:
          MODEL_MANAGER_BASE_URL: ${{ secrets.MODEL_MANAGER_BASE_URL }}
          MODEL_MANAGER_API_KEY: ${{ secrets.MODEL_MANAGER_API_KEY }}
        run: npx tsx scripts/sync-cli.ts
        working-directory: agent-docs

      # ── Step 3: LLM-enhanced README generation ──
      - name: Generate READMEs (LLM-enhanced)
        env:
          MODEL_MANAGER_BASE_URL: ${{ secrets.MODEL_MANAGER_BASE_URL }}
          MODEL_MANAGER_API_KEY: ${{ secrets.MODEL_MANAGER_API_KEY }}
        run: |
          if [ -n "$MODEL_MANAGER_BASE_URL" ] && [ -n "$MODEL_MANAGER_API_KEY" ]; then
            echo "Using LLM-enhanced README generation"
            npx tsx scripts/readme-gen-llm.ts
          else
            echo "::warning::MODEL_MANAGER secrets not set — using template-based generation"
            npx tsx scripts/readme-gen-cli.ts
          fi
        working-directory: agent-docs

      # ── Step 4: Re-sync after README generation, then regenerate LLM docs ──
      - name: Re-sync documentation (pick up new READMEs + regenerate)
        env:
          MODEL_MANAGER_BASE_URL: ${{ secrets.MODEL_MANAGER_BASE_URL }}
          MODEL_MANAGER_API_KEY: ${{ secrets.MODEL_MANAGER_API_KEY }}
        run: npx tsx scripts/sync-cli.ts
        working-directory: agent-docs

      # ── Step 5: Commit README changes (if any) ──
      - name: Commit README updates
        run: |
          git config user.name "agent-docs[bot]"
          git config user.email "agent-docs[bot]@users.noreply.github.com"
          git add '**/README.md'
          git diff --cached --quiet || git commit -m "docs: auto-update READMEs via model-manager LLM"
          git push || true

      # ── Step 5.5: Push READMEs back to Engine/DaemonAgent repos ──
      - name: Push Engine README
        run: |
          cd Engine
          git config user.name "agent-docs[bot]"
          git config user.email "agent-docs[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: auto-update README via agent-docs pipeline"
          git push || true

      - name: Push DaemonAgent README
        run: |
          cd DaemonAgent
          git config user.name "agent-docs[bot]"
          git config user.email "agent-docs[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: auto-update README via agent-docs pipeline"
          git push || true

      # ── Step 6: Build Astro/Starlight ──
      - name: Build docs site
        run: npx astro build
        working-directory: agent-docs

      # ── Step 7: Deploy static files to DO VPS via rsync ──
      - name: Deploy to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: agent-docs/dist/
          remote_path: ~/kadi-gateway/apps/docs/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      # ── Step 8: Trigger graph reindex on DO ──
      - name: Trigger graph reindex
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/AGENTS && git pull --quiet
            cd agent-docs && pm2 restart agent-docs --silent
            sleep 5
            curl -s -X POST http://localhost:3333/api/pipeline > /dev/null 2>&1 &
            echo "Graph reindex triggered"
